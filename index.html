<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>StockScope</title>
    <link rel="stylesheet" href="style.css?v=20260608-1">
    <link rel="stylesheet" href="terminal-theme.css?v=20260608-1">
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <div>
          <p class="eyebrow" id="dashboardMode"></p>
          <h1 id="dashboardTitle">StockScope</h1>
        </div>
        <div class="date-card" aria-label="表示情報">
          <span id="dashboardDate">--</span>
          <strong id="targetCount">0銘柄</strong>
        </div>
      </header>

      <section class="control-panel" aria-label="表示切り替え">
        <nav class="scope-tabs" id="scopeTabs" aria-label="全体または個別"></nav>
        <nav class="stock-tabs" id="stockTabs" aria-label="銘柄" hidden></nav>
        <nav class="period-tabs" id="periodTabs" aria-label="期間"></nav>
      </section>

      <div class="data-status" id="dataStatus" aria-live="polite" hidden></div>

      <section class="content" id="content" aria-live="polite">
        <p class="loading">読み込み中...</p>
      </section>
    </main>

    <script src="config.js"></script>
    <script src="icons.js?v=20260607-1"></script>
    <script src="script.js"></script>
    <script src="ui-patch.js?v=20260607-4"></script>
    <script src="individual-ui-patch.js?v=20260607-2"></script>
    <script src="brush-ui-patch.js?v=20260607-1"></script>
    <script src="brush-ui-watch.js?v=20260607-2"></script>
    <script src="icon-fix-patch.js?v=20260607-3"></script>
    <script src="summary-visibility-patch.js?v=20260607-3"></script>
    <script src="terminal-ui-patch.js?v=20260608-1"></script>
    <link rel="stylesheet" href="terminal-theme.css?v=20260608-2">
  </body>
</html>
